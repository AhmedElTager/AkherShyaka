<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>آخر شياكة</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
  body{ margin:0; font-family:Arial,sans-serif; min-height:100vh; display:flex; justify-content:center; align-items:center; overflow:hidden; background:linear-gradient(-45deg,#000,#0a0a0a,#001a1a,#000); background-size:400% 400%; animation:bgMove 10s ease infinite; }
  @keyframes bgMove{ 0%{background-position:0% 50%;} 50%{background-position:100% 50%;} 100%{background-position:0% 50%;} }
  .app{ width:370px; padding:30px 18px; border-radius:30px; background:rgba(0,0,0,0.6); backdrop-filter:blur(12px); border:1px solid rgba(255,255,255,0.08); text-align:center; box-shadow:0 0 30px rgba(0,255,204,0.15); max-height: 90vh; overflow-y: auto; }
  .profile{ position:relative; width:120px; height:120px; margin:auto; }
  .profile::before{ content:""; position:absolute; inset:-10px; border-radius:50%; background:conic-gradient(#00ffcc,#0066ff,#00ffcc); animation:spin 3s linear infinite; filter:blur(10px); }
  @keyframes spin{ 0%{transform:rotate(0);} 100%{transform:rotate(360deg);} }
  .profile img{ width:120px; height:120px; border-radius:50%; object-fit:cover; position:relative; border:3px solid #000; }
  .name{ color:#fff; font-size:20px; margin:15px 0 5px 0; font-weight:bold; }
  /* قسم النبذة */
  .bio{ color:#ccc; font-size:13px; margin-bottom:20px; line-height:1.6; padding:0 10px; }
  .icons{ display:flex; justify-content:center; gap:15px; margin-bottom:20px; }
  .icons a{ width:40px; height:40px; display:flex; justify-content:center; align-items:center; border-radius:50%; background:#111; color:#fff; text-decoration:none; transition:.3s; }
  .icons a:hover{ background:#00ffcc; color:#000; transform:scale(1.1); }
  .link{ display:flex; justify-content:space-between; align-items:center; padding:12px; margin:8px 0; border-radius:12px; background:rgba(255,255,255,0.05); color:#fff; text-decoration:none; transition:.3s; }
  .link:hover{ background:#00ffcc; color:#000; transform:scale(1.03); }
  .footer{ color:#666; font-size:10px; margin-top:20px; }
</style>
</head>
<body>

<div class="app">
  <div class="profile">
    <img src="logo.jpeg" alt="Logo">
  </div>
  <div class="name">آخر شياكة</div>
  
  <!-- النبذة التعريفية -->
  <div class="bio">
    لو أنت تاجر أونلاين وخايف فلوسك تتركن في بضاعة؟ مكتب "آخر شياكة" سهّلهالك! 💼<br>
    استرداد نقدي كامل خلال 14 يوم، أو استبدال بموديل آخر خلال 20 يوم.<br>
    متاح نظام تسويق بالعمولة (جملة) لزيادة أرباحك بدون مخاطرة.
  </div>

</div>

</body>
